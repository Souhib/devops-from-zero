# ci.yml — Pipeline CI/CD du projet
# Se déclenche à chaque push sur main et sur les pull requests vers main
# Étapes : Lint → Test → Build → Push (sur main uniquement)

name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # --- Étape 1 : Vérifier la qualité du code ---
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4      # Récupère le code du repo

      # Backend : lint avec Ruff (linter Python)
      - name: Setup uv
        uses: astral-sh/setup-uv@v4
      - name: Lint backend (Ruff)
        run: |
          cd backend
          uv run ruff check .

      # Frontend : lint avec Oxlint (linter JS)
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Lint frontend (Oxlint)
        run: |
          cd frontend
          bunx oxlint .

  # --- Étape 2 : Lancer les tests ---
  # needs: lint → ne tourne que si le lint passe (fail fast)
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Run tests
        run: |
          cd backend
          uv run pytest

  # --- Étape 3 : Construire les images Docker ---
  # needs: test → ne tourne que si les tests passent
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t devops-backend:${{ github.sha }} ./backend

      - name: Build frontend image
        run: docker build -t devops-frontend:${{ github.sha }} ./frontend

  # --- Étape 4 : Pousser les images sur Docker Hub ---
  # Ne tourne QUE sur la branche main (pas sur les pull requests)
  # needs: build → ne tourne que si le build réussit
  push:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      # Se connecter à Docker Hub avec les secrets du repo
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/devops-backend:latest ./backend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/devops-backend:latest

      - name: Build and push frontend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/devops-frontend:latest ./frontend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/devops-frontend:latest
