# nginx.conf — Configuration du serveur web nginx (utilisé en production)
# nginx sert deux rôles :
# 1. Servir les fichiers statiques du frontend (HTML, JS, CSS)
# 2. Faire office de reverse proxy : rediriger les requêtes /api vers le backend

server {
    listen 80;  # Écoute sur le port 80 (HTTP standard)

    # Toutes les requêtes qui ne commencent pas par /api → fichiers statiques
    location / {
        root /usr/share/nginx/html;        # Dossier contenant les fichiers buildés (dist/)
        try_files $uri /index.html;        # Si le fichier n'existe pas → renvoyer index.html
                                           # (nécessaire pour le routing React côté client)
    }

    # Les requêtes /api → redirigées vers le backend
    # "backend" est le nom du service dans docker-compose.yml
    # Docker résout ce nom en IP automatiquement (DNS interne)
    location /api {
        proxy_pass http://backend:8000;    # Redirige vers le container backend, port 8000
    }
}
